name: (Monstrosity) Devour
type: feat
img: icons/creatures/abilities/mouth-teeth-long-red.webp
system:
  description:
    value: >-
      <p>When you reduce an adjacent creature to 0 hit points, you can spend
      your reaction to swallow it. Your speed is reduced to 0 until the creature
      is dead, and at the start of each of your turns the creature gains one
      failed death saving throw. If you take damage, you must succeed on a
      Constitution saving throw with a DC of 5 + the damage taken or regurgitate
      the creature into an unoccupied adjacent space. If you die, you
      automatically regurgitate the creature.</p>
