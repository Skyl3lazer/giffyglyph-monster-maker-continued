system:
  description:
    value: >-
      <p>You are controlled by another creature. If the creature is killed or
      otherwise incapacitated, you lose control and must either a) attack the
      nearest creature you can see or b) if no creature is near enough to move
      to and attack, attack an object (with preference for an object smaller
      than yourself).</p>
